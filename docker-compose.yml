services:
  postgres:
    image: postgres:16
    container_name: havre_postgres
    environment:
      POSTGRES_USER: havre
      POSTGRES_PASSWORD: havre_dev_password
      POSTGRES_DB: havre
    ports:
      - "5432:5432"
    volumes:
      - havre_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U havre"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: havre_redis
    ports:
      - "6379:6379"
    volumes:
      - havre_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  havre_postgres_data:
  havre_redis_data:
